<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Gallinita Lola PRO</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#86ddff;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    touch-action:none;
  }
  canvas{
    width:100vw;
    height:100dvh;
    display:block;
    image-rendering:pixelated;
    background:#86ddff;
  }
  .gameBtn{
    position:fixed;
    z-index:10;
    user-select:none;
    -webkit-user-select:none;
    border:none;
    box-shadow:0 6px 16px rgba(0,0,0,.25);
    font-weight:900;
  }
  #jumpBtn{
    right:18px;
    bottom:calc(18px + env(safe-area-inset-bottom));
    width:98px;
    height:98px;
    border-radius:50%;
    background:#ffd6ea;
    border:4px solid #d45b94;
    font-size:17px;
  }
  #muteBtn{
    left:16px;
    bottom:calc(22px + env(safe-area-inset-bottom));
    width:112px;
    height:46px;
    border-radius:15px;
    background:#fff;
    border:3px solid #333;
    font-size:15px;
  }
</style>
</head>
<body>
<canvas id="game" width="480" height="800"></canvas>
<button id="muteBtn" class="gameBtn">🔊 Música</button>
<button id="jumpBtn" class="gameBtn">SALTAR</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;
const groundY = 610;
const gravity = 0.50;
const wingTopLimit = 150; // límite superior para que Lola no pase del marco/HUD
const wingImpulse = -6.2; // impulso suave al presionar Enter/Saltar con ala

let state = "menu";
let level = 1;
let score = 0;
let coins = Number(localStorage.getItem("lola_pro_coins") || 0);
let playerName = localStorage.getItem("lola_player_name") || "";
let lives = 3;
let extraLivesGained = 0;
let livesLost = 0;
let frame = 0;
let speed = 2.1;
let message = "";
let messageTimer = 0;
let goldenActive = false;
let goldenTimer = 0;
let galaxyActive = false;
let galaxyTimer = 0;
let dragonActive = false;
let dragonTimer = 0;
let cornStreak = 0;
let fireBalls = [];
let galaxyEggSpawned = false;
let wingActive = false;
let wingTimer = 0;
let wingSpawnedThisLevel = 0;
let musicMuted = false;
let musicTimer = null;
let currentMusicMode = null;
let musicStep = 0;
let confetti = [];
let floatingTexts = [];

let lola, obstacles, prizes, enemies, clouds, hills, flowers;

const levelData = [
  {name:"Pradera Dulce", bg:"#91e7ff", grass:"#75cf5b", hill:"#57b85c", speed:2.05, targetScore:25, obstacleRate:185, prizeRate:72},
  {name:"Granja de Maíz", bg:"#a7ecff", grass:"#7fd25c", hill:"#69bd4d", speed:2.25, targetScore:55, obstacleRate:172, prizeRate:68},
  {name:"Bosque Estrella", bg:"#9bd6ff", grass:"#61c76a", hill:"#3fa56a", speed:2.45, targetScore:90, obstacleRate:160, prizeRate:64},
  {name:"Río Brillante", bg:"#87dfff", grass:"#6fd98d", hill:"#52b6d8", speed:2.65, targetScore:130, obstacleRate:148, prizeRate:61},
  {name:"Montaña Algodón", bg:"#bfe9ff", grass:"#82d96b", hill:"#9bb7ff", speed:2.85, targetScore:175, obstacleRate:136, prizeRate:58},
  {name:"Valle de Frutillas", bg:"#ffd6e8", grass:"#79d98f", hill:"#ff8db8", speed:3.05, targetScore:225, obstacleRate:126, prizeRate:55},
  {name:"Desierto de Maicitos", bg:"#ffe6a7", grass:"#d6bf58", hill:"#d99f45", speed:3.25, targetScore:280, obstacleRate:116, prizeRate:52},
  {name:"Noche de Luciérnagas", bg:"#3949ab", grass:"#4caf50", hill:"#283593", speed:3.45, targetScore:340, obstacleRate:106, prizeRate:49},
  {name:"Cielo Arcoíris", bg:"#c6f6ff", grass:"#8ce99a", hill:"#d0bfff", speed:3.65, targetScore:405, obstacleRate:98, prizeRate:46},
  {name:"Galaxia de Lola", bg:"#17113f", grass:"#5c7cfa", hill:"#7c3aed", speed:3.85, targetScore:480, obstacleRate:90, prizeRate:43}
];

const motivationalPhrases = [
  "¡Lo estás haciendo súper, {name}!",
  "¡Tú puedes, {name}!",
  "¡Vamos {name}, sigue así!",
  "¡Eres un campeón, {name}!",
  "¡Lola está feliz contigo, {name}!",
  "¡Qué increíble salto, {name}!",
  "¡Sigue juntando premios, {name}!",
  "¡Cada nivel juegas mejor, {name}!",
  "¡{name} y Lola son imparables!",
  "¡Llegaste muy lejos, {name}!"
];

const levelMusic = [
  {tempo:230, melody:[523,587,659,784,659,587,523,392,440,523,587,659,587,523,440,392], bass:[131,131,196,196,174,174,196,196], beat:[1,0,0,1,0,0,1,0]},
  {tempo:220, melody:[440,494,523,659,587,523,494,440,523,587,659,698,659,587,523,494], bass:[147,147,196,196,165,165,196,196], beat:[1,0,1,0,0,1,0,1]},
  {tempo:210, melody:[392,440,494,587,523,494,440,392,494,523,587,659,587,523,494,440], bass:[196,196,147,147,165,165,196,196], beat:[1,0,1,0,0,1,0,1]},
  {tempo:200, melody:[587,659,698,784,698,659,587,523,659,698,784,880,784,698,659,587], bass:[147,174,196,220,196,174,147,174], beat:[1,0,0,1,1,0,1,0]},
  {tempo:190, melody:[659,784,880,784,659,587,659,784,880,988,880,784,659,587,523,587], bass:[165,165,220,220,196,196,247,247], beat:[1,1,0,1,0,1,1,0]},
  {tempo:185, melody:[523,659,784,880,784,659,698,880,988,880,784,698,659,784,880,988], bass:[131,165,196,220,196,165,174,220], beat:[1,0,1,1,0,1,0,1]},
  {tempo:180, melody:[440,523,587,659,587,523,440,392,523,587,659,784,659,587,523,440], bass:[110,147,165,196,165,147,110,147], beat:[1,1,0,0,1,0,1,0]},
  {tempo:170, melody:[587,698,784,880,784,698,587,523,698,784,880,1046,880,784,698,587], bass:[147,174,196,220,196,174,147,174], beat:[1,0,1,0,1,1,0,1]},
  {tempo:160, melody:[784,880,988,1046,988,880,784,659,880,988,1174,1046,988,880,784,659], bass:[196,247,220,196,262,247,220,196], beat:[1,0,1,1,0,1,0,1]},
  {tempo:150, melody:[880,988,1174,1318,1174,988,1046,1318,1568,1318,1174,1046,988,1174,1318,1568], bass:[220,247,294,330,294,247,262,330], beat:[1,1,1,0,1,1,0,1]}
];

const heroTheme = {
  tempo:125,
  melody:[784,988,1174,1318,1174,988,1046,1318,1568,1318,1174,1046,988,1174,1318,1568],
  bass:[196,196,247,247,262,262,247,247],
  beat:[1,1,1,0,1,1,0,1]
};

const wingTheme = {
  tempo:115,
  melody:[659,784,988,1174,988,784,659,587,698,880,1046,880,784,698,659,587],
  bass:[165,196,247,294,247,196,165,147],
  beat:[1,0,0,1,0,1,0,1]
};

function rand(min,max){return Math.random()*(max-min)+min;}
function rects(a,b){return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;}
function safeName(){
  const n = (playerName || "").trim();
  return n ? n : "Jugador";
}
function savePlayerName(){
  playerName = playerName.trim().slice(0,12);
  localStorage.setItem("lola_player_name", playerName);
}
function namedText(text){
  return text.replaceAll("{name}", safeName());
}
function askPlayerName(){
  const typed = prompt("Escribe tu nombre para jugar:", playerName || "");
  if(typed !== null){
    playerName = typed.trim().slice(0,12);
    savePlayerName();
  }
}

function getAudio(){
  return window.audioCtx || (window.audioCtx = new (window.AudioContext || window.webkitAudioContext)());
}
function playTone(freq,duration=0.12,type="sine",volume=0.04){
  if(musicMuted) return;
  const ac = getAudio();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.frequency.value = freq;
  o.type = type;
  g.gain.setValueAtTime(0.0001, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(volume, ac.currentTime + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + duration + 0.03);
}
function playNoise(duration=0.05,volume=0.022){
  if(musicMuted) return;
  const ac = getAudio();
  const buffer = ac.createBuffer(1, ac.sampleRate*duration, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
  const src = ac.createBufferSource();
  const g = ac.createGain();
  g.gain.value = volume;
  src.buffer = buffer;
  src.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime+duration);
}
function stopAllMusic(){
  if(musicTimer) clearInterval(musicTimer);
  musicTimer = null;
  currentMusicMode = null;
  musicStep = 0;
}
function startSequencer(theme,mode){
  if(musicMuted || currentMusicMode === mode) return;
  stopAllMusic();
  currentMusicMode = mode;
  musicStep = 0;
  musicTimer = setInterval(()=>{
    const m = theme.melody[musicStep % theme.melody.length];
    const b = theme.bass[Math.floor(musicStep/2) % theme.bass.length];
    const beat = theme.beat[musicStep % theme.beat.length];
    playTone(m,0.16,"triangle",0.040);
    if(musicStep%2===0) playTone(m*1.25,0.12,"sine",0.016);
    if(musicStep%2===0) playTone(b,0.22,"square",0.023);
    if(beat) playNoise(0.04,0.015);
    musicStep++;
  }, theme.tempo);
}
function playBgMusic(){
  if(musicMuted) return;
  startSequencer(levelMusic[Math.min(level-1, levelMusic.length-1)], "level-"+level);
}
function playHeroMusic(){
  if(musicMuted) return;
  startSequencer(heroTheme, "hero");
}
function playWingMusic(){
  if(musicMuted) return;
  startSequencer(wingTheme, "wing");
}
function beep(freq=440,dur=.06){
  if(musicMuted) return;
  playTone(freq,dur,"square",0.035);
}

function resetLola(){
  lola = {x:70,y:groundY-76,w:70,h:70,vy:0,jumping:false,walk:0,inv:0};
}
function startLevel(n){
  level = n;
  const cfg = levelData[level-1];
  speed = cfg.speed;
  goldenActive = false;
  goldenTimer = 0;
  galaxyActive = false;
  galaxyTimer = 0;
  dragonActive = false;
  dragonTimer = 0;
  cornStreak = 0;
  fireBalls = [];
  galaxyEggSpawned = false;
  wingActive = false;
  wingTimer = 0;
  wingSpawnedThisLevel = 0;
  obstacles = [];
  prizes = [];
  enemies = [];
  clouds = [];
  hills = [];
  flowers = [];
  floatingTexts = [];
  resetLola();

  for(let i=0;i<7;i++) clouds.push({x:rand(0,W),y:rand(75,230),s:rand(.7,1.3),dx:rand(.18,.4)});
  for(let i=0;i<5;i++) hills.push({x:i*145,y:groundY-80-rand(0,55),w:220,h:100});
  for(let i=0;i<25;i++) flowers.push({x:rand(0,W),y:rand(groundY+20,H-35),c:["#ff75a0","#ffe066","#a78bfa","#fff"][i%4]});

  message = safeName()+" · Nivel "+level+": "+cfg.name;
  messageTimer = 140;
  state = "play";
  playBgMusic();
}
function resetGame(){
  if(!playerName || playerName.trim()===""){
    askPlayerName();
    if(!playerName || playerName.trim()===""){
      message = "Escribe tu nombre primero";
      messageTimer = 100;
      return;
    }
  }

  score = 0;
  lives = 3;
  extraLivesGained = 0;
  livesLost = 0;
  confetti = [];
  startLevel(1);
}

function jump(){
  if(state==="menu"){ resetGame(); return; }
  if(state==="gameover" || state==="win"){ resetGame(); return; }

  // Poder de ala: cada pulsación da un impulso suave hacia arriba.
  // No sube infinito: queda limitado por wingTopLimit y vuelve a caer si no se pulsa otra vez.
  if(wingActive){
    if(lola.y > wingTopLimit + 6){
      lola.vy = Math.max(lola.vy + wingImpulse, -8.2);
      lola.jumping = true;
      beep(780,.04);
    }else{
      lola.y = wingTopLimit;
      lola.vy = Math.max(lola.vy, 1.2);
      beep(520,.035);
    }
    return;
  }

  if(!lola.jumping){
    lola.vy = -18.5;
    lola.jumping = true;
    beep(660,.05);
  }
}

function spawnThings(){
  const cfg = levelData[level-1];

  if(frame % Math.max(105, Math.floor(cfg.obstacleRate - level*2)) === 0){
    const type = Math.random()>.5 ? "rock" : "cactus";
    obstacles.push({
      x:W+50,
      y:type==="rock" ? groundY-34 : groundY-54,
      w:type==="rock" ? 40 : 34,
      h:type==="rock" ? 34 : 56,
      type
    });
  }

  if(frame % Math.max(38, Math.floor(cfg.prizeRate - level*2)) === 0){
    const r = Math.random();
    let type = "corn";
    if(r>.82) type="star";
    else if(r>.62) type="heart";
    else if(r>.55) type="berry";
    const high = Math.random()>.5;
    prizes.push({
      x:W+50,
      y:high ? groundY-180-rand(0,30) : groundY-105,
      w:34,h:34,type,taken:false,bob:rand(0,30)
    });
  }

  // Huevo de oro, aparece ocasionalmente.
  if(frame % 520 === 0){
    prizes.push({x:W+50,y:groundY-125,w:42,h:42,type:"gold",taken:false,bob:0});
  }

  // Huevo galaxia: aparece una vez por nivel y da 5 segundos de súper poder.
  const prevTarget = level===1 ? 0 : levelData[level-2].targetScore;
  const midTarget = prevTarget + (cfg.targetScore - prevTarget) * 0.45;
  if(!galaxyEggSpawned && score >= midTarget){
    galaxyEggSpawned = true;
    prizes.push({x:W+50,y:groundY-185,w:46,h:46,type:"galaxy",taken:false,bob:0});
  }

  // Ala de gallina: aparece 1 o 2 veces por nivel y permite flotar un poco más.
  const wingLimit = level <= 3 ? 1 : 2;
  const wingPointA = prevTarget + (cfg.targetScore - prevTarget) * 0.28;
  const wingPointB = prevTarget + (cfg.targetScore - prevTarget) * 0.72;
  if(wingSpawnedThisLevel < wingLimit){
    const nextWingScore = wingSpawnedThisLevel === 0 ? wingPointA : wingPointB;
    if(score >= nextWingScore){
      wingSpawnedThisLevel++;
      prizes.push({x:W+50,y:groundY-155,w:44,h:34,type:"wing",taken:false,bob:0});
    }
  }

  // Enemigos pixel-art: zorro, puerco espín y cuervo.
  // Se eliminan enemigos genéricos.
  const enemyRate = Math.max(120, 430 - level*32);
  if(frame % enemyRate === 0){
    const enemyPool = level < 3 ? ["fox","hedgehog"] : ["fox","hedgehog","crow"];
    const enemyType = enemyPool[Math.floor(Math.random()*enemyPool.length)];
    const isCrow = enemyType === "crow";
    const baseY = isCrow ? groundY-205-rand(0,55) : (enemyType==="fox" ? groundY-62 : groundY-50);
    enemies.push({
      x:W+55,
      y:baseY,
      baseY,
      phase:rand(0,100),
      w: enemyType==="fox" ? 62 : (enemyType==="hedgehog" ? 56 : 58),
      h: enemyType==="fox" ? 50 : (enemyType==="hedgehog" ? 40 : 46),
      speed:speed + .38 + level*.14 + (isCrow ? .25 : 0),
      type: enemyType
    });
  }
}

function hitLife(){
  if(lola.inv>0 || goldenActive || galaxyActive || dragonActive) return;
  lives--;
  livesLost++;
  cornStreak = 0; // La racha SOLO se pierde cuando Lola recibe daño.
  floatingTexts.push({x:lola.x+20,y:lola.y-34,text:"Racha perdida 💥",life:75});
  floatingTexts.push({x:lola.x+20,y:lola.y-10,text:"-1 vida",life:70});
  lola.inv = 95;
  message = "¡Cuidado Lola!";
  messageTimer = 70;
  beep(130,.08);
  if(lives<=0){
    state = "gameover";
    stopAllMusic();
  }
}

function levelUp(){
  createConfetti();
  if(level < levelData.length){
    const next = level + 1;
    startLevel(next);
    message = namedText(motivationalPhrases[(next-2)%motivationalPhrases.length]);
    messageTimer = 180;
  }else{
    state = "win";
    stopAllMusic();
  }
}

function createConfetti(){
  confetti = [];
  for(let i=0;i<70;i++){
    confetti.push({x:rand(0,W),y:rand(-60,180),vx:rand(-1.5,1.5),vy:rand(1,4),c:["#ff75a0","#ffe066","#74c0fc","#69db7c","#b197fc"][i%5],life:120});
  }
}

function update(){
  frame++;
  if(messageTimer>0) messageTimer--;

  // confetti update
  confetti.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.life--;});
  confetti = confetti.filter(c=>c.life>0);

  if(state!=="play") return;

  spawnThings();

  lola.walk += speed*2.2;
  lola.y += lola.vy;

  if(wingActive){
    // Flotación controlada: cae lento, sube solo con Enter/Saltar y no cruza el límite superior.
    lola.vy += gravity * 0.42;
    if(lola.vy > 2.8) lola.vy = 2.8;
    if(lola.y < wingTopLimit){
      lola.y = wingTopLimit;
      lola.vy = Math.max(lola.vy, 1.2);
    }
  }else{
    lola.vy += gravity;
  }

  if(lola.y > groundY-lola.h){
    lola.y = groundY-lola.h;
    lola.vy = 0;
    lola.jumping = false;
  }

  obstacles.forEach(o=>o.x-=speed);
  prizes.forEach(p=>p.x-=speed);
  enemies.forEach(e=>{
    e.x-=e.speed;
    if(e.type==="crow") e.y = e.baseY + Math.sin((frame+e.phase)/18)*42;
  });
  clouds.forEach(c=>{c.x-=c.dx;if(c.x<-130)c.x=W+80;});
  hills.forEach(h=>{h.x-=speed*.25;if(h.x<-260)h.x=W+120;});
  flowers.forEach(f=>{f.x-=speed;if(f.x<-20)f.x=W+rand(0,80);});

  obstacles = obstacles.filter(o=>o.x>-100);
  prizes = prizes.filter(p=>p.x>-100 && !p.taken);
  enemies = enemies.filter(e=>e.x>-100);

  // Modo Dragón: dispara fuego automáticamente y destruye enemigos/obstáculos.
  if(dragonActive && frame % 10 === 0){
    fireBalls.push({
      x:lola.x + 63,
      y:lola.y + 31,
      w:42,
      h:18,
      vx:8.8,
      life:80
    });
  }

  fireBalls.forEach(f=>{
    f.x += f.vx;
    f.life--;
  });

  for(const f of fireBalls){
    for(const e of enemies){
      if(e.x > -100 && rects(f,e)){
        score += 3;
        coins += 1;
        localStorage.setItem("lola_pro_coins", coins);
        floatingTexts.push({x:e.x,y:e.y,text:"+3 fuego",life:60});
        e.x = -140;
        f.life = 0;
        beep(520,.04);
      }
    }

    for(const o of obstacles){
      if(o.x > -100 && rects(f,o)){
        score += 2;
        coins += 1;
        localStorage.setItem("lola_pro_coins", coins);
        floatingTexts.push({x:o.x,y:o.y,text:"+2 fuego",life:60});
        o.x = -140;
        f.life = 0;
        beep(420,.04);
      }
    }
  }

  fireBalls = fireBalls.filter(f=>f.life>0 && f.x<W+90);
  obstacles = obstacles.filter(o=>o.x>-100);
  enemies = enemies.filter(e=>e.x>-100);

  const lolaHit = {x:lola.x+12,y:lola.y+12,w:lola.w-24,h:lola.h-14};

  for(const o of obstacles){
    if(rects(lolaHit,o)){
      hitLife();
      o.x = -120;
      break;
    }
  }

  for(const e of enemies){
    if(rects(lolaHit,e)){
      if(goldenActive || galaxyActive || dragonActive){
        score += dragonActive ? 5 : (galaxyActive ? 4 : 2);
        coins += 2;
        localStorage.setItem("lola_pro_coins", coins);
        floatingTexts.push({x:e.x,y:e.y,text: dragonActive ? "+5 fuego" : (galaxyActive ? "+4 pts" : "+2 pts"),life:60});
        e.x = -120;
        beep(720,.05);
      }else{
        hitLife();
        e.x = -120;
      }
      break;
    }
  }

  for(const p of prizes){
    if(rects({x:lola.x,y:lola.y,w:lola.w,h:lola.h}, p)){
      p.taken = true;
      let gained = 1;
      if(p.type==="star") gained=5;
      else if(p.type==="heart") gained=3;
      else if(p.type==="berry") gained=0;
      else if(p.type==="gold") gained=0;
      else if(p.type==="galaxy") gained=0;
      else if(p.type==="wing") gained=0;

      if(p.type==="berry"){
        if(lives < 5){
          lives++;
          extraLivesGained++;
          floatingTexts.push({x:p.x,y:p.y,text:"+1 vida",life:70});
        }else{
          score += 2;
          coins += 2;
          localStorage.setItem("lola_pro_coins", coins);
          floatingTexts.push({x:p.x,y:p.y,text:"+2 pts",life:70});
        }
        message = lives >= 5 ? "🍓 "+safeName()+": vidas llenas, +2 puntos" : "🍓 ¡Vida extra para "+safeName()+"!";
        messageTimer = 80;
      }else if(p.type==="gold"){
        goldenActive = true;
        galaxyActive = false;
        dragonActive = false;
        dragonTimer = 0;
        fireBalls = [];
        goldenTimer = 180;
        galaxyTimer = 0;
        floatingTexts.push({x:p.x,y:p.y,text:"¡Súper poder!",life:80});
        message = "✨ ¡"+safeName()+", gallina dorada invencible!";
        messageTimer = 100;
        stopAllMusic();
        playHeroMusic();
      }else if(p.type==="galaxy"){
        galaxyActive = true;
        goldenActive = false;
        wingActive = false;
        dragonActive = false;
        dragonTimer = 0;
        fireBalls = [];
        galaxyTimer = 300; // 5 segundos aprox
        goldenTimer = 0;
        wingTimer = 0;
        floatingTexts.push({x:p.x,y:p.y,text:"¡Poder galaxia!",life:90});
        message = "🌌 ¡"+safeName()+", Lola Galaxia por 5 segundos!";
        messageTimer = 120;
        stopAllMusic();
        playHeroMusic();
      }else if(p.type==="wing"){
        wingActive = true;
        goldenActive = false;
        galaxyActive = false;
        dragonActive = false;
        dragonTimer = 0;
        fireBalls = [];
        wingTimer = 300; // 5 segundos aprox
        goldenTimer = 0;
        galaxyTimer = 0;
        floatingTexts.push({x:p.x,y:p.y,text:"¡Ala mágica 5s!",life:90});
        message = "🪽 ¡"+safeName()+", ala mágica por 5 segundos!";
        messageTimer = 120;
        stopAllMusic();
        playWingMusic();
      }else{
        score += gained;
        coins += gained;

        if(p.type === "corn"){
          cornStreak++;
          floatingTexts.push({x:p.x,y:p.y-18,text:"Racha x"+cornStreak+" 🔥🔥🔥",life:65});

          if(cornStreak >= 10 && !dragonActive){
            dragonActive = true;
            dragonTimer = 300; // 5 segundos aprox
            cornStreak = 0;
            goldenActive = false;
            galaxyActive = false;
            wingActive = false;
            goldenTimer = 0;
            galaxyTimer = 0;
            wingTimer = 0;
            fireBalls = [];
            message = "🐉 ¡Modo Dragón activado! Fuego total 🔥";
            messageTimer = 120;
            stopAllMusic();
            playHeroMusic();
          }
        }else{
          // La racha de elotes NO se pierde por tomar otros premios.
        }

        localStorage.setItem("lola_pro_coins", coins);
        floatingTexts.push({x:p.x,y:p.y,text:"+"+gained+" pts",life:60});
      }
      beep(900,.04);
    }
  }

  floatingTexts.forEach(t=>{t.y-=0.8;t.life--;});
  floatingTexts = floatingTexts.filter(t=>t.life>0);

  if(goldenActive){
    goldenTimer--;
    if(goldenTimer<=0){
      goldenActive=false;
      stopAllMusic();
      playBgMusic();
    }
  }

  if(galaxyActive){
    galaxyTimer--;
    if(galaxyTimer<=0){
      galaxyActive=false;
      stopAllMusic();
      playBgMusic();
    }
  }

  if(dragonActive){
    dragonTimer--;
    if(dragonTimer<=0){
      dragonActive=false;
      fireBalls = [];
      stopAllMusic();
      playBgMusic();
    }
  }

  if(wingActive){
    wingTimer--;
    if(wingTimer<=0){
      wingActive=false;
      stopAllMusic();
      playBgMusic();
    }
  }

  if(lola.inv>0) lola.inv--;

  const cfg = levelData[level-1];
  if(score >= cfg.targetScore) levelUp();
}

function drawStarShape(cx,cy,r1,r2){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const a=-Math.PI/2+i*Math.PI/5;
    const r=i%2===0?r1:r2;
    ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
}

function drawGoldenAura(x,y,walk){
  const cx=x+34, cy=y+34;
  const pulse=1+Math.sin(frame/6)*.08;

  ctx.save();
  ctx.globalAlpha=.36;
  ctx.fillStyle="#ffd700";
  ctx.beginPath(); ctx.arc(cx,cy,48*pulse,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=.22;
  ctx.fillStyle="#fff2a8";
  ctx.beginPath(); ctx.arc(cx,cy,66*pulse,0,Math.PI*2); ctx.fill();
  ctx.restore();

  drawPixelChicken(x,y,4,walk);

  // tinte dorado manual compatible iPhone
  ctx.save();
  ctx.globalAlpha=.38;
  ctx.fillStyle="#ffd700";
  ctx.fillRect(x+6,y+20,54,46);
  ctx.fillRect(x+34,y+8,34,34);
  ctx.restore();

  // estrellitas de súper poder
  ctx.save();
  for(let i=0;i<8;i++){
    const angle=frame*.08+i*Math.PI*2/8;
    const sx=cx+Math.cos(angle)*58;
    const sy=cy+Math.sin(angle)*48;
    ctx.globalAlpha=.75+Math.sin(frame/5+i)*.25;
    ctx.fillStyle=i%2===0 ? "#fff7a8" : "#ffd700";
    drawStarShape(sx,sy,8,3);
  }
  ctx.restore();

  // rayos
  ctx.save();
  ctx.strokeStyle="#ffe066";
  ctx.lineWidth=3;
  ctx.globalAlpha=.7;
  for(let i=0;i<6;i++){
    const a=frame*.06+i*Math.PI*2/6;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*38, cy+Math.sin(a)*34);
    ctx.lineTo(cx+Math.cos(a)*72, cy+Math.sin(a)*62);
    ctx.stroke();
  }
  ctx.restore();
}


function drawGalaxyAura(x,y,walk){
  const cx=x+34, cy=y+34;
  const pulse=1+Math.sin(frame/5)*.10;

  ctx.save();
  ctx.globalAlpha=.35;
  ctx.fillStyle="#7c3aed";
  ctx.beginPath(); ctx.arc(cx,cy,54*pulse,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=.25;
  ctx.fillStyle="#22d3ee";
  ctx.beginPath(); ctx.arc(cx,cy,74*pulse,0,Math.PI*2); ctx.fill();
  ctx.restore();

  drawPixelChicken(x,y,4,walk);

  // tinte galaxia compatible iPhone
  ctx.save();
  ctx.globalAlpha=.35;
  const grad = ctx.createLinearGradient(x,y,x+70,y+70);
  grad.addColorStop(0,"#7c3aed");
  grad.addColorStop(.5,"#22d3ee");
  grad.addColorStop(1,"#ff4fd8");
  ctx.fillStyle=grad;
  ctx.fillRect(x+6,y+20,54,46);
  ctx.fillRect(x+34,y+8,34,34);
  ctx.restore();

  // órbita de estrellas y planetitas
  ctx.save();
  for(let i=0;i<10;i++){
    const angle=frame*.10+i*Math.PI*2/10;
    const sx=cx+Math.cos(angle)*64;
    const sy=cy+Math.sin(angle)*52;
    ctx.globalAlpha=.75+Math.sin(frame/4+i)*.25;
    ctx.fillStyle=i%3===0 ? "#22d3ee" : (i%3===1 ? "#ff4fd8" : "#fff");
    drawStarShape(sx,sy,8,3);
  }
  ctx.restore();

  // aro galáctico
  ctx.save();
  ctx.strokeStyle="#ffffff";
  ctx.globalAlpha=.65;
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.ellipse(cx,cy,76,24,Math.sin(frame/18)*.8,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}


function drawDragonLola(x,y,scale=3){
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.scale(scale, scale);

  const line=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);};
  const px=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,1,1);};

  // 🔥 AURA DE FUEGO ANIMADA alrededor del dragón
  ctx.save();
  const cx = 17, cy = 12;
  for(let i=0;i<5;i++){
    ctx.globalAlpha = Math.max(0.07, 0.30 - i*0.045);
    ctx.fillStyle = i%3===0 ? "#ff2400" : (i%3===1 ? "#ff9900" : "#fff36d");
    ctx.beginPath();
    ctx.ellipse(
      cx + Math.sin(frame/7+i)*2,
      cy + Math.cos(frame/8+i)*2,
      24 + i*4 + Math.sin(frame/5+i)*3,
      18 + i*3 + Math.cos(frame/6+i)*2,
      0,
      0,
      Math.PI*2
    );
    ctx.fill();
  }

  // Llamas tipo corona
  for(let i=0;i<9;i++){
    const fx = -4 + i*5;
    const fy = 24 + Math.sin(frame/4+i)*2;
    ctx.globalAlpha = .70;
    ctx.fillStyle = i%2===0 ? "#ff3b00" : "#ffb000";
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx+3, fy-8-Math.sin(frame/5+i)*4);
    ctx.lineTo(fx+6, fy);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  const outline="#4a0404";
  const red="#c1121f";
  const red2="#ef233c";
  const dark="#780000";
  const orange="#ff3b00";
  const yellow="#ffd166";
  const wing="#9d0208";

  // cola
  line(-3,12,5,3,outline);
  line(-6,11,3,2,dark);
  line(1,11,5,4,dark);
  line(-8,10,2,2,orange);

  // ala trasera
  line(4,2,10,2,outline);
  line(5,4,11,3,outline);
  line(6,1,7,2,wing);
  line(7,4,8,2,orange);
  line(4,7,5,2,dark);

  // cuerpo rojo
  line(3,8,16,1,outline);
  line(2,9,19,7,outline);
  line(4,10,15,6,red);
  line(6,8,10,3,red2);
  line(5,14,13,2,dark);

  // pancita
  line(8,12,8,2,"#ffba08");
  line(10,14,6,1,"#faa307");

  // cabeza
  line(17,4,9,1,outline);
  line(16,5,11,7,outline);
  line(18,6,8,5,red);
  line(19,4,5,3,red2);

  // hocico hacia la derecha
  line(26,7,5,1,outline);
  line(26,8,7,3,outline);
  line(26,8,5,2,red);
  line(31,9,2,1,dark);

  // ojo
  line(23,7,1,1,"#fff36d");
  px(23,7,"#000");

  // cuernos
  line(18,1,2,3,yellow);
  line(23,1,2,3,yellow);
  line(18,0,2,1,"#fff3bf");
  line(23,0,2,1,"#fff3bf");

  // cresta
  line(10,5,2,2,yellow);
  line(14,4,2,2,yellow);
  line(18,3,2,2,yellow);

  // patas animadas
  const step = Math.floor(frame/8)%2;
  if(step===0){
    line(6,16,3,4,dark); line(5,20,5,1,outline);
    line(15,16,3,4,dark); line(16,20,5,1,outline);
  }else{
    line(7,16,3,4,dark); line(8,20,5,1,outline);
    line(14,16,3,4,dark); line(13,20,5,1,outline);
  }

  // 🔥 fuego en la boca
  if(frame % 10 < 8){
    line(33,8,7,3,"#ff2400");
    line(40,9,7,2,"#ff9900");
    line(47,9,5,1,"#fff36d");
  }

  ctx.restore();
}

function drawWorld(){
  const cfg = levelData[level-1] || levelData[0];

  // cielo
  ctx.fillStyle=cfg.bg;
  ctx.fillRect(0,0,W,H);

  // estrellas para niveles nocturnos / galaxia
  if(level >= 8){
    for(let i=0;i<38;i++){
      const sx = (i*73 + frame*0.15) % W;
      const sy = 30 + (i*41 % 260);
      ctx.fillStyle = i%3===0 ? "#fff7a8" : "#ffffff";
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  // nubes
  clouds.forEach(c=>{
    ctx.fillStyle="rgba(255,255,255,.76)";
    ctx.beginPath();
    ctx.arc(c.x,c.y,16*c.s,0,Math.PI*2);
    ctx.arc(c.x+22*c.s,c.y+3,21*c.s,0,Math.PI*2);
    ctx.arc(c.x+47*c.s,c.y,15*c.s,0,Math.PI*2);
    ctx.fill();
  });

  // cerros
  hills.forEach(h=>{
    ctx.fillStyle=cfg.hill;
    ctx.beginPath();
    ctx.ellipse(h.x,h.y,h.w/2,h.h,0,0,Math.PI*2);
    ctx.fill();
  });

  // suelo
  ctx.fillStyle=cfg.grass;
  ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle="#d9b879";
  ctx.fillRect(0,groundY+52,W,88);
  ctx.fillStyle="#3f8f3c";
  ctx.fillRect(0,groundY,W,8);

  // flores
  flowers.forEach(f=>{
    ctx.fillStyle=f.c; ctx.fillRect(f.x,f.y,5,5);
    ctx.fillStyle="#2b8a3e"; ctx.fillRect(f.x+2,f.y+5,2,6);
  });

  // obstáculos
  obstacles.forEach(o=>{
    if(o.type==="rock"){
      ctx.fillStyle="#555"; ctx.fillRect(o.x+6,o.y+12,34,23);
      ctx.fillStyle="#777"; ctx.fillRect(o.x+12,o.y+2,25,20);
      ctx.fillStyle="#333"; ctx.fillRect(o.x+6,o.y+32,34,5);
    }else{
      ctx.fillStyle="#2f9e44";
      ctx.fillRect(o.x+13,o.y,12,56);
      ctx.fillRect(o.x+2,o.y+20,25,10);
      ctx.fillRect(o.x+22,o.y+32,16,10);
      ctx.fillStyle="#1f6f31";
      ctx.fillRect(o.x+15,o.y+5,3,46);
    }
  });

  // enemigos pixel-art: zorro, puerco espín y cuervo
  enemies.forEach(e=>{
    if(e.type==="fox"){
      ctx.fillStyle="rgba(0,0,0,.18)";
      ctx.beginPath();
      ctx.ellipse(e.x+26,e.y+43,28,6,0,0,Math.PI*2);
      ctx.fill();
      drawPixelFoxLeft(e.x-8,e.y-16,2.05,frame);
    }else if(e.type==="hedgehog"){
      ctx.fillStyle="rgba(0,0,0,.18)";
      ctx.beginPath();
      ctx.ellipse(e.x+26,e.y+36,24,6,0,0,Math.PI*2);
      ctx.fill();
      drawPixelHedgehog(e.x-2,e.y-2,2.15,frame);
    }else if(e.type==="crow"){
      ctx.save();
      ctx.globalAlpha=.22;
      ctx.fillStyle="#000";
      ctx.beginPath();
      ctx.ellipse(e.x+28,groundY-8,20,5,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
      drawPixelCrow(e.x,e.y,2.25,frame);
    }
  });

  // premios
  prizes.forEach(p=>{
    const y = p.y + Math.sin((frame+p.bob)/10)*5;
    if(p.type==="galaxy"){
      const gy = y;
      const grad = ctx.createLinearGradient(p.x,gy,p.x+42,gy+42);
      grad.addColorStop(0,"#4c1d95");
      grad.addColorStop(.45,"#2563eb");
      grad.addColorStop(1,"#ff4fd8");
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.ellipse(p.x+22,gy+22,18,24,0,0,Math.PI*2); ctx.fill();

      ctx.strokeStyle="#bdefff";
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x+22,gy+22,29+Math.sin(frame/5)*5,0,Math.PI*2); ctx.stroke();

      ctx.fillStyle="#fff";
      drawStarShape(p.x+12,gy+9,5,2);
      drawStarShape(p.x+34,gy+18,6,2);
      drawStarShape(p.x+22,gy+34,4,2);
    }else if(p.type==="gold"){
      ctx.fillStyle="#ffd700";
      ctx.beginPath(); ctx.ellipse(p.x+20,y+20,16,22,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#fff2a8"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x+20,y+20,25+Math.sin(frame/6)*4,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle="#fff"; ctx.fillRect(p.x+13,y+9,7,7);
      ctx.fillStyle="#ffec66"; drawStarShape(p.x+36,y+4,7,3);
    }else if(p.type==="star"){
      ctx.fillStyle="#ffd43b"; drawStarShape(p.x+17,y+17,18,8);
    }else if(p.type==="heart"){
      ctx.fillStyle="#ff5c8a";
      ctx.fillRect(p.x+8,y+10,20,18); ctx.fillRect(p.x+4,y+14,28,12);
    }else if(p.type==="berry"){
      ctx.fillStyle="#ff3b5c";
      ctx.beginPath(); ctx.arc(p.x+17,y+18,15,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#2f9e44"; ctx.fillRect(p.x+12,y+3,10,8);
    }else if(p.type==="wing"){
      ctx.save();
      ctx.translate(p.x+22,y+18);
      ctx.rotate(Math.sin(frame/8)*0.25);
      ctx.fillStyle="#ffffff";
      ctx.beginPath();
      ctx.ellipse(0,0,22,12,-0.35,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle="#222";
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.fillStyle="#dbeafe";
      ctx.fillRect(-13,2,8,4);
      ctx.fillRect(-3,5,9,4);
      ctx.fillRect(8,4,8,4);
      ctx.restore();
    }else{
      ctx.fillStyle="#ffcf33";
      ctx.fillRect(p.x+10,y+2,14,28);
      ctx.fillStyle="#2f9e44";
      ctx.fillRect(p.x+4,y+18,8,16); ctx.fillRect(p.x+24,y+18,8,16);
    }
  });

  // fuego del modo dragón
  fireBalls.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=.95;
    ctx.fillStyle="#ff2400";
    ctx.fillRect(f.x,f.y,32,14);
    ctx.fillStyle="#ffb000";
    ctx.fillRect(f.x+10,f.y+3,30,8);
    ctx.fillStyle="#fff36d";
    ctx.fillRect(f.x+25,f.y+5,14,4);
    ctx.restore();
  });

  // textos flotantes
  floatingTexts.forEach(t=>{
    ctx.save();
    ctx.globalAlpha=Math.max(0,t.life/70);
    ctx.fillStyle="#fff";
    ctx.strokeStyle="#222";
    ctx.lineWidth=4;
    ctx.font="bold 22px monospace";
    ctx.strokeText(t.text,t.x,t.y);
    ctx.fillText(t.text,t.x,t.y);
    ctx.restore();
  });

  // sombra + Lola
  if(state==="play" || state==="gameover" || state==="win"){
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath();
    ctx.ellipse(lola.x+35,groundY-8,lola.jumping?22:30,8,0,0,Math.PI*2);
    ctx.fill();

    if(!lola.inv || lola.inv%12<6){
      const floatY = wingActive ? lola.y + Math.sin(frame/6)*5 : lola.y;
      if(dragonActive) drawDragonLola(lola.x-8,floatY+3,3);
      else if(galaxyActive) drawGalaxyAura(lola.x,floatY,lola.walk);
      else if(goldenActive) drawGoldenAura(lola.x,floatY,lola.walk);
      else drawPixelChicken(lola.x,floatY,4,lola.walk,wingActive);
    }
  }

  // confeti
  confetti.forEach(c=>{
    ctx.fillStyle=c.c;
    ctx.fillRect(c.x,c.y,6,10);
  });
}

function drawHUD(){
  const cfg = levelData[level-1];
  const prevTarget = level===1 ? 0 : levelData[level-2].targetScore;
  const progress = Math.min(1,(score-prevTarget)/(cfg.targetScore-prevTarget));

  ctx.fillStyle="rgba(255,255,255,.94)";
  ctx.fillRect(10,18,W-20,132);
  ctx.strokeStyle="#2b5f2b";
  ctx.lineWidth=3;
  ctx.strokeRect(10,18,W-20,132);

  ctx.fillStyle="#222";
  ctx.font="bold 17px monospace";
  ctx.fillText("🐔 "+safeName(),24,48);
  ctx.fillText("Nivel "+level,150,48);
  ctx.fillText("Pts: "+score,260,48);
  ctx.fillText("❤ "+lives,380,48);

  ctx.font="bold 13px monospace";
  ctx.fillText("⭐=5 ❤️=3 🌽=1 🍓=vida 🥚=oro 🌌=5s 🪽=flotar 🐉=10🌽",24,76);

  ctx.font="12px monospace";
  ctx.fillText("Evita enemigos. 🪽 Enter/Saltar = flotar.",24,100);
  ctx.fillText("Monedas acumuladas: "+coins+" 🪙",24,124);

  ctx.fillStyle="#ddd";
  ctx.fillRect(210,112,230,16);
  ctx.fillStyle="#55c85a";
  ctx.fillRect(210,112,230*progress,16);
  ctx.strokeStyle="#222";
  ctx.lineWidth=2;
  ctx.strokeRect(210,112,230,16);

  if(goldenActive){
    ctx.fillStyle="#b8860b";
    ctx.font="bold 13px monospace";
    ctx.fillText("✨ Súper Lola: "+Math.ceil(goldenTimer/60)+"s",24,144);
  }
  if(galaxyActive){
    ctx.fillStyle="#4c1d95";
    ctx.font="bold 13px monospace";
    ctx.fillText("🌌 Lola Galaxia: "+Math.ceil(galaxyTimer/60)+"s",24,144);
  }
  if(wingActive){
    ctx.fillStyle="#6b4fbb";
    ctx.font="bold 13px monospace";
    ctx.fillText("🪽 Ala mágica: "+Math.ceil(wingTimer/60)+"s",24,144);
  }
  if(wingActive){
    ctx.fillStyle="#2563eb";
    ctx.font="bold 13px monospace";
    ctx.fillText("🪽 Ala mágica: "+Math.ceil(wingTimer/60)+"s",24,144);
  }

  if(dragonActive){
    ctx.fillStyle="#c2410c";
    ctx.font="bold 13px monospace";
    ctx.fillText("🐉 Modo Dragón: "+Math.ceil(dragonTimer/60)+"s · lanzando fuego 🔥",24,144);
  }else if(!goldenActive && !galaxyActive && !wingActive){
    ctx.fillStyle="#7c2d12";
    ctx.font="bold 13px monospace";
    ctx.fillText("Racha x"+cornStreak+" 🔥🔥🔥 · 10 elotes = Modo Dragón 🐉",24,144);
  }

  ctx.fillStyle="rgba(255,255,255,.65)";
  ctx.font="bold 10px monospace";
  ctx.textAlign="center";
  ctx.fillText("Creado por RichGPT", W/2, H-10);
  ctx.textAlign="left";

  if(messageTimer>0){
    ctx.fillStyle="rgba(0,0,0,.62)";
    ctx.fillRect(24,170,W-48,62);
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.font="bold 18px monospace";
    ctx.fillText(message,W/2,208);
    ctx.textAlign="left";
  }
}

function drawMenu(){
  const cfg = levelData[0];
  ctx.fillStyle=cfg.bg;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle=cfg.hill;
  ctx.beginPath();
  ctx.ellipse(110,520,180,130,0,0,Math.PI*2);
  ctx.ellipse(340,535,190,140,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle=cfg.grass;
  ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle="#d9b879";
  ctx.fillRect(0,groundY+52,W,88);

  drawPixelChicken(W/2-72,300,7,frame);

  ctx.fillStyle="#222";
  ctx.textAlign="center";
  ctx.font="bold 28px monospace";
  ctx.fillText("Gallinita Lola",W/2,82);

  ctx.font="16px monospace";
  ctx.fillText("La gallinita corredora",W/2,114);
  ctx.fillText("Junta premios y pasa niveles",W/2,140);

  ctx.fillStyle="rgba(255,255,255,.92)";
  ctx.fillRect(42,165,396,102);
  ctx.strokeStyle="#2b5f2b";
  ctx.lineWidth=3;
  ctx.strokeRect(42,165,396,102);
  ctx.fillStyle="#222";
  ctx.font="bold 14px monospace";
  ctx.fillText("Jugador:",W/2,192);
  ctx.fillStyle="#fff7b2";
  ctx.fillRect(W/2-135,205,270,36);
  ctx.strokeStyle="#222";
  ctx.lineWidth=2;
  ctx.strokeRect(W/2-135,205,270,36);
  ctx.fillStyle="#222";
  ctx.font="bold 17px monospace";
  ctx.fillText(playerName ? playerName : "Toca aquí para escribir",W/2,229);
  ctx.font="bold 12px monospace";
  ctx.fillText("⭐=5 ❤️=3 🌽=1 🍓=vida 🪽=flotar",W/2,258);

  ctx.fillStyle="#fff7b2";
  ctx.fillRect(W/2-120,620,240,68);
  ctx.strokeStyle="#222";
  ctx.lineWidth=4;
  ctx.strokeRect(W/2-120,620,240,68);

  ctx.fillStyle="#222";
  ctx.font="bold 28px monospace";
  ctx.fillText("JUGAR",W/2,664);

  ctx.font="14px monospace";
  ctx.fillText("Monedas: "+coins+" 🪙",W/2,720);
  ctx.fillText("Botón SALTAR para jugar",W/2,744);
  ctx.font="bold 11px monospace";
  ctx.fillText("Creado por RichGPT",W/2,782);
  ctx.textAlign="left";
}

function drawEnd(title,subtitle){
  drawWorld();
  ctx.fillStyle="rgba(0,0,0,.62)";
  ctx.fillRect(0,0,W,H);

  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.font="bold 34px monospace";
  ctx.fillText(title,W/2,H/2-75);

  ctx.font="18px monospace";
  ctx.fillText(subtitle,W/2,H/2-34);
  ctx.fillText("Monedas: "+coins+" 🪙",W/2,H/2-8);

  ctx.fillStyle="#fff7b2";
  ctx.fillRect(W/2-150,H/2+35,300,72);
  ctx.strokeStyle="#222";
  ctx.lineWidth=4;
  ctx.strokeRect(W/2-150,H/2+35,300,72);

  ctx.fillStyle="#222";
  ctx.font="bold 22px monospace";
  ctx.fillText("JUGAR DE NUEVO",W/2,H/2+80);
  ctx.font="bold 11px monospace";
  ctx.fillStyle="#fff";
  ctx.fillText("Creado por RichGPT",W/2,H-18);
  ctx.textAlign="left";
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(state==="menu"){drawMenu(); return;}
  drawWorld();

  if(state==="play") drawHUD();
  if(state==="gameover") drawEnd("GAME OVER","Puntos: "+score);
  if(state==="win") drawEnd("¡GANASTE!","¡"+safeName()+" lo logró con Lola!");
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function checkClick(clientX,clientY){
  const r = canvas.getBoundingClientRect();
  const x = (clientX-r.left)*W/r.width;
  const y = (clientY-r.top)*H/r.height;

  if(state==="menu"){
    if(x>W/2-145 && x<W/2+145 && y>198 && y<248){
      askPlayerName();
      return;
    }
    if(x>W/2-135 && x<W/2+135 && y>600 && y<710) resetGame();
    else jump();
  }else if(state==="gameover" || state==="win"){
    if(x>W/2-165 && x<W/2+165 && y>H/2+20 && y<H/2+125) resetGame();
  }else{
    jump();
  }
}

canvas.addEventListener("click",e=>checkClick(e.clientX,e.clientY));
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  checkClick(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

window.addEventListener("keydown",e=>{
  if(state==="menu"){
    if(e.key==="Backspace"){
      e.preventDefault();
      playerName = playerName.slice(0,-1);
      savePlayerName();
      return;
    }
    if(e.key==="Enter"){
      e.preventDefault();
      resetGame();
      return;
    }
    if(e.key.length===1 && playerName.length<12){
      playerName += e.key;
      savePlayerName();
      return;
    }
  }

  if(e.code==="Space" || e.key==="ArrowUp" || e.key==="Enter"){
    e.preventDefault();
    jump();
  }
});

document.getElementById("jumpBtn").addEventListener("click",e=>{e.preventDefault();jump();});
document.getElementById("jumpBtn").addEventListener("touchstart",e=>{e.preventDefault();jump();},{passive:false});

document.getElementById("muteBtn").addEventListener("click",()=>{
  musicMuted = !musicMuted;
  document.getElementById("muteBtn").textContent = musicMuted ? "🔇 Silencio" : "🔊 Música";
  if(musicMuted) stopAllMusic();
  else if(state==="play"){
    if(wingActive) playWingMusic();
    else if(goldenActive || galaxyActive || dragonActive) playHeroMusic();
    else playBgMusic();
  }
});

resetLola();
obstacles=[]; prizes=[]; enemies=[]; clouds=[]; hills=[]; flowers=[];
for(let i=0;i<7;i++) clouds.push({x:rand(0,W),y:rand(75,230),s:rand(.7,1.3),dx:rand(.18,.4)});
for(let i=0;i<5;i++) hills.push({x:i*145,y:groundY-80-rand(0,55),w:220,h:100});
for(let i=0;i<25;i++) flowers.push({x:rand(0,W),y:rand(groundY+20,H-35),c:["#ff75a0","#ffe066","#a78bfa","#fff"][i%4]});
loop();
</script>
